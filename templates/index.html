<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #0b141a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #00a884;
        }
        p {
            font-size: 18px;
            color: #8696a0;
            margin-bottom: 40px;
        }
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .btn {
            padding: 15px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }
        .btn-login {
            background: transparent;
            border: 2px solid #00a884;
            color: #00a884;
        }
        .btn-login:hover {
            background: #00a884;
            color: #fff;
        }
        .btn-register {
            background: #00a884;
            color: #fff;
        }
        .btn-register:hover {
            background: #008f72;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Telegram Clone</h1>
        <p>Быстрый и безопасный мессенджер с регистрацией по номеру телефона</p>
        <div class="buttons">
            <a href="{{ url_for('login') }}" class="btn btn-login">Войти</a>
            <a href="{{ url_for('register') }}" class="btn btn-register">Регистрация</a>
        </div>
    </div>
</body>
</html>
