{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 30px; background: #1f2c34; border-radius: 15px;">
    <h2 style="text-align: center; margin-bottom: 30px;">Регистрация</h2>
    <form method="POST">
        <div style="margin-bottom: 20px;">
            <input type="text" name="username" placeholder="Имя пользователя" required style="width: 100%; padding: 12px; background: #2a3942; border: none; border-radius: 8px; color: #fff;">
        </div>
        <div style="margin-bottom: 20px;">
            <input type="email" name="email" placeholder="Email" required style="width: 100%; padding: 12px; background: #2a3942; border: none; border-radius: 8px; color: #fff;">
        </div>
        <div style="margin-bottom: 20px;">
            <input type="password" name="password" placeholder="Пароль" required style="width: 100%; padding: 12px; background: #2a3942; border: none; border-radius: 8px; color: #fff;">
        </div>
        <button type="submit" style="width: 100%; padding: 12px; background: #00a884; border: none; border-radius: 8px; color: #fff; font-size: 16px; cursor: pointer;">Зарегистрироваться</button>
    </form>
    <p style="text-align: center; margin-top: 20px; color: #8696a0;">
        Уже есть аккаунт? <a href="/login" style="color: #00a884;">Войти</a>
    </p>
</div>
{% endblock %}
