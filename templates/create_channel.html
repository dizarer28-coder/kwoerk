{% extends "base.html" %}

{% block title %}Создание канала{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background: #1f2c34; border-radius: 15px; padding: 30px;">
        <h1 style="margin-bottom: 30px;">📢 Создать канал</h1>
        
        <form method="POST" enctype="multipart/form-data">
            <div style="text-align: center; margin-bottom: 30px;">
                <div style="position: relative; display: inline-block;">
                    <img src="{{ url_for('static', filename='uploads/channels/channel_default.jpg') }}" 
                         id="avatarPreview"
                         style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid #00a884; cursor: pointer;"
                         onclick="document.getElementById('avatarInput').click()">
                    <div style="position: absolute; bottom: 10px; right: 10px; background: #00a884; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;"
                         onclick="document.getElementById('avatarInput').click()">
                        <i class="fas fa-camera" style="color: #fff;"></i>
                    </div>
                </div>
                <input type="file" id="avatarInput" name="avatar" accept="image/*" style="display: none;" onchange="previewAvatar(this)">
                <p style="color: #8696a0; margin-top: 10px;">Загрузите аватарку канала</p>
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #8696a0;">Название канала</label>
                <input type="text" name="name" required
                       style="width: 100%; padding: 12px; background: #2a3942; border: none; border-radius: 8px; color: #fff;">
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #8696a0;">Описание</label>
                <textarea name="description" rows="4"
                          style="width: 100%; padding: 12px; background: #2a3942; border: none; border-radius: 8px; color: #fff;"></textarea>
            </div>
            
            <button type="submit" style="width: 100%; padding: 15px; background: #00a884; border: none; border-radius: 8px; color: #fff; font-size: 18px; cursor: pointer;">
                Создать канал
            </button>
        </form>
    </div>
</div>

<script>
    function previewAvatar(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('avatarPreview').src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
