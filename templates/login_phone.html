<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход по номеру телефона</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #0b141a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #1f2c34;
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00a884;
        }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #2a3942;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        input::placeholder {
            color: #8696a0;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #00a884;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background: #008f72;
        }
        .link {
            text-align: center;
            margin-top: 20px;
        }
        .link a {
            color: #00a884;
            text-decoration: none;
        }
        .error {
            background: #ff4757;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .info {
            background: #2a3942;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            color: #8696a0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Вход</h1>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="error">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <div class="info">
            Введите номер телефона (например: 79123456789) или имя пользователя
        </div>
        
        <form method="POST">
            <input type="text" name="login" placeholder="Телефон или имя пользователя" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        
        <div class="link">
            Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a>
        </div>
    </div>
</body>
</html>
